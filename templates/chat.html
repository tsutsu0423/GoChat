<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リアルタイムチャット</title>
  </head>

  <style>
    #messages {
      text-align: left;
      color: #ffffff;
      background: #113131;
      width: 400px;
      min-height: 300px;
      padding: 10px;
      font-family: 'Lucida Grande', 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', 'Meiryo', 'メイリオ', sans-serif;
      font-size: small;
    }
    .message {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 0;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 12px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    #online-count {
      color: #2ecc71;
      font-weight: bold;
      margin-bottom: 6px;
    }
    #typing-indicator {
      color: #aaaaaa;
      font-style: italic;
      font-size: small;
      min-height: 18px; /* 表示・非表示でレイアウトがずれないよう高さを確保 */
      margin: 2px 0;
    }
  </style>

  <body>
    <div>
      <h3>リアルタイムチャット</h3>
      <p id="online-count">オンライン: --人</p>
      <div id="messages"></div>
      <!-- タイピングインジケーター: 誰かが入力中の時だけ文字が表示される -->
      <p id="typing-indicator"></p>
      <input placeholder="say something" id="text" type="text" />
      <p><a href="/logout">ログアウト</a></p>
    </div>

    <script>
      var ws = new WebSocket("ws://" + window.location.host + "/ws");

      // 自分のユーザーID（サーバーから "me" メッセージで受け取って保存する）
      var currentUserID = null;

      // 現在入力中のユーザーを管理するオブジェクト { userID: username, ... }
      // 複数人が同時に入力中でも対応できるようにオブジェクトで管理する
      var typingUsers = {};

      // typingUsersの内容を "alice, bob が入力中..." の形式で表示する
      function updateTypingIndicator() {
        var names = Object.values(typingUsers); // オブジェクトの値（ユーザー名）だけ配列で取り出す
        var indicator = document.getElementById("typing-indicator");
        if (names.length === 0) {
          indicator.innerText = ""; // 誰も入力中でなければ空にする
        } else {
          indicator.innerText = names.join(", ") + " が入力中...";
        }
      }

      // 2秒後に stopTyping を送るタイマー（キー入力のたびにリセットする）
      var typingTimer = null;

      // メッセージをDOMに追加する関数
      // id: DBのメッセージID, content: 本文, userID: 送信者ID, username: 送信者名, createdAt: 投稿時刻
      function addMessage(id, content, userID, username, createdAt) {
        var div = document.createElement("div");
        div.className = "message";
        div.setAttribute("data-id", id); // data-id属性にDBのIDを入れておく（削除時に特定するため）

        var text = document.createElement("span");
        text.innerText = createdAt + " [" + username + "] : " + content;
        div.appendChild(text);

        // 自分のメッセージにだけ削除ボタンを追加する
        if (userID === currentUserID) {
          var btn = document.createElement("button");
          btn.className = "delete-btn";
          btn.innerText = "削除";
          btn.onclick = function () {
            // 削除リクエストをJSON形式でサーバーに送る
            ws.send(JSON.stringify({ type: "delete", id: id }));
          };
          div.appendChild(btn);
        }

        document.getElementById("messages").appendChild(div);
      }

      // サーバーからメッセージが届いた時の処理
      ws.onmessage = function (msg) {
        var data = JSON.parse(msg.data);

        if (data.type === "me") {
          // 自分のユーザーIDを受け取って保存する
          // これ以降に届くメッセージの userID と比較して削除ボタンを出すか決める
          currentUserID = data.userID;

        } else if (data.type === "userCount") {
          document.getElementById("online-count").innerText =
            "オンライン: " + data.count + "人";

        } else if (data.type === "chat") {
          // メッセージが届いたらその人のタイピング表示を消す（送信完了したから）
          delete typingUsers[data.userID];
          updateTypingIndicator();
          addMessage(data.id, data.content, data.userID, data.username, data.createdAt);

        } else if (data.type === "typing") {
          // 自分自身のタイピングは表示しない（自分は自分が打っているとわかるから）
          if (data.userID !== currentUserID) {
            typingUsers[data.userID] = data.username; // キーをuserIDにして上書きで管理
            updateTypingIndicator();
          }

        } else if (data.type === "stopTyping") {
          delete typingUsers[data.userID]; // そのユーザーを入力中リストから削除
          updateTypingIndicator();

        } else if (data.type === "delete") {
          // data-id属性が一致するDOM要素を探して削除する
          var el = document.querySelector("[data-id='" + data.id + "']");
          if (el) el.remove();
        }
      };

      // inputイベント: テキストが変化するたびに発火（keypress より幅広く検知できる）
      text.addEventListener("input", function () {
        // typing を送信（サーバーが全員に中継する）
        ws.send(JSON.stringify({ type: "typing" }));

        // 既存タイマーをリセットして2秒後に stopTyping を送る
        // キーを打ち続ける限りタイマーは延長され、止まったら2秒後に発火する
        clearTimeout(typingTimer);
        typingTimer = setTimeout(function () {
          ws.send(JSON.stringify({ type: "stopTyping" }));
        }, 2000);
      });

      text.addEventListener("keypress", function (e) {
        if (e.key === "Enter" && text.value !== "") {
          // Enter を押したら即座に stopTyping → タイマーが残っていてもキャンセル
          clearTimeout(typingTimer);
          ws.send(JSON.stringify({ type: "stopTyping" }));
          ws.send(JSON.stringify({ type: "chat", content: text.value }));
          text.value = "";
        }
      });
    </script>
  </body>
</html>
